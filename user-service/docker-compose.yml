services:
  db:
    image: postgres:16-alpine
    container_name: peerprep_user_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: peerprep_db
    ports:
      - "5432:5432"
    volumes:
      # Use the absolute path to your models folder if relative fails
      - ./src/models/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - peerprep-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: peerprep_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80" # Access via http://localhost:5050
    networks:
      - peerprep-network
    depends_on:
      - db

networks:
  peerprep-network:
    driver: bridge

volumes:
  pgdata: