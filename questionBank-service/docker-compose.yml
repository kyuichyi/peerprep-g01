services:
  db:
    image: postgres:16-alpine
    container_name: peerprep_question_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: peerprep_question_db
    ports:
      - "5433:5432"
    volumes:
      - ./src/models/init.sql:/docker-entrypoint-initdb.d/init.sql
      - qb_pgdata:/var/lib/postgresql/data
    networks:
      - questionbank-network

networks:
  questionbank-network:
    driver: bridge

volumes:
  qb_pgdata:
